<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Bibliotecario UNTELS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* ── SCREENS ── */
  .screen { display:none; min-height:100vh; }
  .screen.active { display:flex; }

  /* ── LOGIN ── */
  #login-screen {
    background: var(--bg);
    align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .login-bg {
    position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 60% at 20% 40%, rgba(59,130,246,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 70%, rgba(139,92,246,0.10) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 60% 10%, rgba(6,182,212,0.08) 0%, transparent 50%);
  }
  .login-grid {
    position:absolute; inset:0;
    background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .login-card {
    position:relative; z-index:2;
    background: rgba(17,24,39,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(59,130,246,0.08), 0 40px 80px rgba(0,0,0,0.5);
    animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  .login-logo {
    display:flex; align-items:center; gap:12px; margin-bottom:36px;
  }
  .login-logo-icon {
    width:44px; height:44px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .login-logo-text h1 { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
  .login-logo-text p { font-size:11px; color:var(--text2); font-family:'JetBrains Mono',monospace; }
  .login-title { font-size:24px; font-weight:700; margin-bottom:6px; letter-spacing:-0.5px; }
  .login-sub { font-size:13px; color:var(--text2); margin-bottom:32px; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; letter-spacing:0.5px; text-transform:uppercase; }
  .form-group input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:12px 16px; color:var(--text); font-family:'Sora',sans-serif;
    font-size:14px; transition:border-color 0.2s, box-shadow 0.2s; outline:none;
  }
  .form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.12); }
  .btn-login {
    width:100%; padding:13px; border:none; border-radius:10px; cursor:pointer;
    font-family:'Sora',sans-serif; font-size:14px; font-weight:600; letter-spacing:0.3px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    color:#fff; margin-top:8px; transition:opacity 0.2s, transform 0.1s;
    position:relative; overflow:hidden;
  }
  .btn-login:hover { opacity:0.9; transform:translateY(-1px); }
  .btn-login:active { transform:translateY(0); }
  .login-error { color:var(--danger); font-size:12px; margin-top:12px; text-align:center; display:none; }
  .quick-users { margin-top:28px; padding-top:24px; border-top:1px solid var(--border); }
  .quick-users p { font-size:11px; color:var(--text3); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
  .quick-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .quick-btn {
    flex:1; min-width:80px; padding:8px 10px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text2); font-size:11px; font-family:'Sora',sans-serif;
    cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .quick-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(59,130,246,0.08); }
  .quick-btn span { display:block; font-size:10px; color:var(--text3); margin-top:2px; }

  /* ── APP SHELL ── */
  #app-screen { flex-direction:column; }
  .topbar {
    height:60px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:100;
  }
  .topbar-logo { display:flex; align-items:center; gap:10px; margin-right:auto; }
  .topbar-logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--accent3)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .topbar-logo h2 { font-size:14px; font-weight:700; }
  .topbar-logo span { font-size:11px; color:var(--text2); font-family:'JetBrains Mono',monospace; }
  .topbar-user { display:flex; align-items:center; gap:10px; }
  .topbar-role { font-size:11px; font-family:'JetBrains Mono',monospace; padding:3px 10px; border-radius:20px; font-weight:500; }
  .role-admin { background:rgba(139,92,246,0.15); color:#a78bfa; border:1px solid rgba(139,92,246,0.25); }
  .role-biblio { background:rgba(6,182,212,0.12); color:#22d3ee; border:1px solid rgba(6,182,212,0.2); }
  .role-student { background:rgba(16,185,129,0.12); color:#34d399; border:1px solid rgba(16,185,129,0.2); }
  .topbar-name { font-size:13px; font-weight:600; }
  .btn-logout { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text2); font-family:'Sora',sans-serif; font-size:12px; cursor:pointer; transition:all 0.2s; }
  .btn-logout:hover { border-color:var(--danger); color:var(--danger); }

  /* ── LAYOUT ── */
  .app-body { display:flex; flex:1; overflow:hidden; height:calc(100vh - 60px); }
  .sidebar {
    width:220px; background:var(--surface); border-right:1px solid var(--border);
    padding:20px 12px; display:flex; flex-direction:column; gap:4px; overflow-y:auto;
    flex-shrink:0;
  }
  .sidebar-section { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; font-weight:700; padding:12px 8px 6px; margin-top:8px; }
  .sidebar-section:first-child { margin-top:0; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px;
    cursor:pointer; font-size:13px; color:var(--text2); transition:all 0.15s; border:1px solid transparent;
  }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { background:rgba(59,130,246,0.12); color:var(--accent); border-color:rgba(59,130,246,0.2); }
  .nav-item .icon { font-size:15px; width:18px; text-align:center; }
  .nav-item .badge { margin-left:auto; font-size:10px; background:var(--accent); color:#fff; border-radius:10px; padding:1px 7px; font-family:'JetBrains Mono',monospace; }

  /* ── MAIN ── */
  .main { flex:1; overflow-y:auto; padding:28px 32px; }
  .page { display:none; animation: pageIn 0.3s ease; }
  .page.active { display:block; }
  @keyframes pageIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom:28px; }
  .page-header h2 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .page-header p { color:var(--text2); font-size:13px; margin-top:4px; }

  /* ── STAT CARDS ── */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px;
    position:relative; overflow:hidden; transition:border-color 0.2s;
  }
  .stat-card:hover { border-color:var(--accent); }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card.blue::before { background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .stat-card.purple::before { background:linear-gradient(90deg,var(--accent3),#ec4899); }
  .stat-card.green::before { background:linear-gradient(90deg,var(--success),#34d399); }
  .stat-card.yellow::before { background:linear-gradient(90deg,var(--warning),#fbbf24); }
  .stat-icon { font-size:24px; margin-bottom:12px; }
  .stat-num { font-size:30px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:-1px; }
  .stat-label { font-size:12px; color:var(--text2); margin-top:4px; }

  /* ── TABLES ── */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:20px; }
  .card-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .card-header h3 { font-size:14px; font-weight:600; }
  .card-body { padding:0; }
  table { width:100%; border-collapse:collapse; }
  th { font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text3); font-weight:600; padding:12px 22px; text-align:left; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02); }
  td { padding:13px 22px; font-size:13px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(59,130,246,0.03); }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; font-family:'JetBrains Mono',monospace; }
  .badge-green { background:rgba(16,185,129,0.12); color:#34d399; border:1px solid rgba(16,185,129,0.2); }
  .badge-red { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
  .badge-blue { background:rgba(59,130,246,0.12); color:#60a5fa; border:1px solid rgba(59,130,246,0.2); }
  .badge-purple { background:rgba(139,92,246,0.12); color:#a78bfa; border:1px solid rgba(139,92,246,0.2); }
  .badge-yellow { background:rgba(245,158,11,0.12); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }

  /* ── BUTTONS ── */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; border:none; cursor:pointer; font-family:'Sora',sans-serif; font-size:12px; font-weight:600; transition:all 0.15s; letter-spacing:0.2px; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#2563eb; }
  .btn-sm { padding:5px 10px; font-size:11px; border-radius:6px; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#f87171; }
  .btn-danger:hover { background:var(--danger); color:#fff; }
  .btn-success { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:#34d399; }
  .btn-success:hover { background:var(--success); color:#fff; }

  /* ── SEARCH ── */
  .search-bar { display:flex; gap:10px; margin-bottom:20px; }
  .search-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 16px; color:var(--text); font-family:'Sora',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; }
  .search-input:focus { border-color:var(--accent); }
  select.filter-select { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text2); font-family:'Sora',sans-serif; font-size:13px; outline:none; cursor:pointer; }

  /* ── SPRINT BOARD ── */
  .sprint-board { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
  .sprint-col { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .sprint-col-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .sprint-col-header h4 { font-size:13px; font-weight:600; }
  .sprint-tasks { padding:12px; display:flex; flex-direction:column; gap:8px; }
  .task-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
  .task-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .task-id { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--text3); }
  .task-title { font-size:12px; font-weight:600; margin-bottom:4px; }
  .task-desc { font-size:11px; color:var(--text2); }
  .task-assignee { font-size:10px; color:var(--text3); margin-top:6px; display:flex; align-items:center; gap:4px; }

  /* ── PROFILE ── */
  .profile-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:28px; display:flex; gap:24px; align-items:flex-start; margin-bottom:20px; }
  .profile-avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent3)); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
  .profile-info h3 { font-size:18px; font-weight:700; }
  .profile-info p { color:var(--text2); font-size:13px; margin-top:4px; }
  .profile-meta { display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; }
  .profile-tag { font-size:11px; font-family:'JetBrains Mono',monospace; padding:4px 12px; border-radius:20px; border:1px solid var(--border); color:var(--text2); }

  /* ── BOOKS ── */
  .books-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .book-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color 0.2s, transform 0.2s; }
  .book-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .book-cover { height:120px; display:flex; align-items:center; justify-content:center; font-size:40px; }
  .book-cover.c1 { background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(139,92,246,0.2)); }
  .book-cover.c2 { background:linear-gradient(135deg,rgba(6,182,212,0.2),rgba(16,185,129,0.2)); }
  .book-cover.c3 { background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(239,68,68,0.2)); }
  .book-cover.c4 { background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(236,72,153,0.2)); }
  .book-info { padding:14px; }
  .book-title { font-size:13px; font-weight:600; margin-bottom:4px; }
  .book-author { font-size:11px; color:var(--text2); margin-bottom:8px; }

  /* ── MODAL ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:1000; display:none; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; width:480px; max-width:95vw; animation: cardIn 0.3s; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .modal-header h3 { font-size:16px; font-weight:700; }
  .modal-close { background:none; border:none; color:var(--text2); cursor:pointer; font-size:18px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-field { margin-bottom:16px; }
  .form-field label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
  .form-field input, .form-field select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:'Sora',sans-serif; font-size:13px; outline:none; }
  .form-field input:focus, .form-field select:focus { border-color:var(--accent); }
  .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 20px; display:flex; align-items:center; gap:10px; font-size:13px; z-index:2000; animation: toastIn 0.3s; box-shadow:0 20px 40px rgba(0,0,0,0.4); }
  @keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* ── EMPTY ── */
  .empty { text-align:center; padding:60px 20px; color:var(--text3); }
  .empty .emoji { font-size:40px; margin-bottom:12px; }
  .empty p { font-size:14px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen" class="screen active">
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">📚</div>
      <div class="login-logo-text">
        <h1>UNTELS Library</h1>
        <p>v1.0 — Sistema Integral</p>
      </div>
    </div>
    <h2 class="login-title">Bienvenido</h2>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="login-user" placeholder="usuario@untels.edu.pe" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn-login" onclick="doLogin()">Iniciar Sesión →</button>
    <p class="login-error" id="login-err">❌ Usuario o contraseña incorrectos</p>
    <div class="quick-users">
      <p>Acceso rápido (demo)</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickLogin('admin','1234')">👑 Admin<span>admin</span></button>
        <button class="quick-btn" onclick="quickLogin('bibliotecario1','1234')">📖 Biblio<span>bibliotecario1</span></button>
        <button class="quick-btn" onclick="quickLogin('juan.perez','1234')">🎓 Estudiante<span>juan.perez</span></button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app-screen" class="screen">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon">📚</div>
      <div>
        <h2>UNTELS Library</h2>
        <span id="top-role-label"></span>
      </div>
    </div>
    <div class="topbar-user">
      <span class="topbar-role" id="top-role-badge"></span>
      <span class="topbar-name" id="top-username"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="app-body">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main-content"></main>
  </div>
</div>

<!-- ══════════════ MODAL ══════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-inner"></div>
</div>

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const user = USERS.find(x => (x.username === u || x.email === u) && x.password === p);
  if (!user) { document.getElementById('login-err').style.display='block'; return; }
  currentUser = user;
  document.getElementById('login-err').style.display='none';
  showApp();
}
function quickLogin(u, p) {
  document.getElementById('login-user').value = u;
  document.getElementById('login-pass').value = p;
  doLogin();
}
function doLogout() {
  currentUser = null;
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('app-screen').classList.remove('active');
}

function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  const roleClass = { Admin:'role-admin', Bibliotecario:'role-biblio', Estudiante:'role-student' }[currentUser.role];
  document.getElementById('top-role-badge').textContent = currentUser.role;
  document.getElementById('top-role-badge').className = 'topbar-role ' + roleClass;
  document.getElementById('top-username').textContent = currentUser.name;
  document.getElementById('top-role-label').textContent = 'Sistema Integral de Gestión';
  buildSidebar();
  navigateTo(currentUser.role === 'Estudiante' ? 'my-profile' : 'dashboard');
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  const items = NAV[currentUser.role] || [];
  items.forEach(item => {
    if (item.section) {
      sidebar.innerHTML += `<div class="sidebar-section">${item.section}</div>`;
    } else {
      sidebar.innerHTML += `
        <div class="nav-item" id="nav-${item.id}" onclick="navigateTo('${item.id}')">
          <span class="icon">${item.icon}</span>
          ${item.label}
          ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
        </div>`;
    }
  });
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  const main = document.getElementById('main-content');
  const pages = { dashboard, 'sprint-board': sprintBoard, admins, biblios, students, books, 'my-profile': myProfile };
  if (pages[page]) main.innerHTML = pages[page]();
  else main.innerHTML = '<div class="empty"><div class="emoji">🚧</div><p>Página en construcción</p></div>';
}

  document.getElementById('students-table').innerHTML=renderStudentsTable(s,c,st);
}
function toggleStudentAccess(id){const s=STUDENTS.find(x=>x.id===id);if(s){s.library_access=!s.library_access;filterStudents();showToast(s.library_access?'✅ Acceso habilitado':'🔒 Acceso restringido');}}
function toggleStudentStatus(id){const s=STUDENTS.find(x=>x.id===id);if(s){s.status=!s.status;filterStudents();showToast(s.status?'✅ Estudiante activado':'🚫 Estudiante bloqueado');}}
function openStudentModal(){
  openModal(`
    <div class="modal-header"><h3>Nuevo Estudiante</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-row">
      <div class="form-field"><label>Nombre</label><input id="m-name" placeholder="Nombre completo" /></div>
      <div class="form-field"><label>Código</label><input id="m-cod" placeholder="EST2024XXX" /></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Email</label><input id="m-email" placeholder="email@untels.edu.pe" /></div>
      <div class="form-field"><label>Teléfono</label><input id="m-phone" placeholder="9XXXXXXXX" /></div>
    </div>
    <div class="form-field"><label>Carrera</label>
      <select id="m-carrera">${CARRERAS.map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveStudent()">Registrar</button>
    </div>`);
}
function saveStudent(){
  const name=document.getElementById('m-name').value;
  const cod=document.getElementById('m-cod').value;
  const email=document.getElementById('m-email').value;
  const phone=document.getElementById('m-phone').value;
  const carrera=document.getElementById('m-carrera').value;
  if(!name||!cod){alert('Completa nombre y código');return;}
  STUDENTS.push({id:Date.now(),name,codigo:cod,carrera,phone,email,library_access:true,status:true});
  closeModal();navigateTo('students');showToast('✅ Estudiante registrado');
}

function books() {
  const isStudent = currentUser.role==='Estudiante';
  return `
  <div class="page active">
    <div class="page-header">
      <h2>${isStudent?'Catálogo de Libros':'Gestión de Libros'}</h2>
      <p>${isStudent?'Consulta el catálogo y disponibilidad de libros':'Administra el inventario de libros físicos y virtuales'}</p>
    </div>
    <div class="search-bar">
      <input class="search-input" placeholder="Buscar por título, autor o ISBN..." oninput="filterBooks()" id="book-search" />
      <select class="filter-select" onchange="filterBooks()" id="book-cat">
        <option value="">Todas las categorías</option>
        <option>Programación</option><option>Ingeniería</option><option>Literatura</option>
        <option>Matemáticas</option><option>Redes</option>
      </select>
      <select class="filter-select" onchange="filterBooks()" id="book-tipo">
        <option value="">Físico y Virtual</option>
        <option>Físico</option><option>Virtual</option>
      </select>
      ${!isStudent?`<button class="btn btn-primary" onclick="openBookModal()">＋ Nuevo Libro</button>`:''}
    </div>
    <div class="card">
      <div class="card-body" id="books-table">${renderBooksTable()}</div>
    </div>
  </div>`;
}
function renderBooksTable(s='',cat='',tipo=''){
  const isStudent=currentUser.role==='Estudiante';
  let f=BOOKS.filter(b=>{
    const ms=b.title.toLowerCase().includes(s.toLowerCase())||b.author.toLowerCase().includes(s.toLowerCase())||b.isbn.includes(s);
    const mc=!cat||b.categoria===cat;
    const mt=!tipo||b.tipo===tipo;
    return ms&&mc&&mt;
  });
  return `<table>
    <thead><tr><th>Título</th><th>Autor</th><th>ISBN</th><th>Categoría</th><th>Tipo</th><th>Stock</th><th>Disponible</th>${!isStudent?'<th>Acciones</th>':''}</tr></thead>
    <tbody>
      ${f.map(b=>`<tr>
        <td style="font-weight:500">${b.title}</td>
        <td style="color:var(--text2);font-size:12px">${b.author}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)">${b.isbn}</td>
        <td><span class="badge badge-blue">${b.categoria}</span></td>
        <td><span class="badge ${b.tipo==='Físico'?'badge-yellow':'badge-purple'}">${b.tipo}</span></td>
        <td style="font-family:'JetBrains Mono',monospace;text-align:center">${b.tipo==='Físico'?b.stock:'∞'}</td>
        <td><span class="badge ${b.disponible?'badge-green':'badge-red'}">${b.disponible?'Sí':'No'}</span></td>
        ${!isStudent?`<td><div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-ghost" onclick="editBook(${b.id})">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="deleteBook(${b.id})">Eliminar</button>
        </div></td>`:''}
      </tr>`).join('')}
    </tbody>
  </table>`;
}
function filterBooks(){
  const s=document.getElementById('book-search')?.value||'';
  const c=document.getElementById('book-cat')?.value||'';
  const t=document.getElementById('book-tipo')?.value||'';
  document.getElementById('books-table').innerHTML=renderBooksTable(s,c,t);
}
function deleteBook(id){if(confirm('¿Eliminar libro?')){BOOKS=BOOKS.filter(b=>b.id!==id);filterBooks();showToast('🗑️ Libro eliminado');}}
function openBookModal(book=null){
  openModal(`
    <div class="modal-header"><h3>${book?'Editar':'Nuevo'} Libro</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="form-row">
      <div class="form-field"><label>Título</label><input id="m-title" value="${book?book.title:''}" placeholder="Título del libro" /></div>
      <div class="form-field"><label>Autor</label><input id="m-author" value="${book?book.author:''}" placeholder="Nombre del autor" /></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>ISBN</label><input id="m-isbn" value="${book?book.isbn:''}" placeholder="978-XXXXXXXXXX" /></div>
      <div class="form-field"><label>Categoría</label>
        <select id="m-cat">
          ${['Programación','Ingeniería','Literatura','Matemáticas','Redes'].map(c=>`<option ${book&&book.categoria===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Tipo</label>
        <select id="m-tipo">
          <option ${book&&book.tipo==='Físico'?'selected':''}>Físico</option>
          <option ${book&&book.tipo==='Virtual'?'selected':''}>Virtual</option>
        </select>
      </div>
      <div class="form-field"><label>Stock</label><input id="m-stock" type="number" value="${book?book.stock:0}" placeholder="0" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveBook(${book?book.id:null})">${book?'Actualizar':'Registrar'}</button>
    </div>`);
}
function editBook(id){const b=BOOKS.find(x=>x.id===id);if(b)openBookModal(b);}
function saveBook(id){
  const title=document.getElementById('m-title').value;
  const author=document.getElementById('m-author').value;
  const isbn=document.getElementById('m-isbn').value;
  const cat=document.getElementById('m-cat').value;
  const tipo=document.getElementById('m-tipo').value;
  const stock=parseInt(document.getElementById('m-stock').value)||0;
  if(!title||!author){alert('Completa título y autor');return;}
  if(id){
    const b=BOOKS.find(x=>x.id===id);
    Object.assign(b,{title,author,isbn,categoria:cat,tipo,stock,disponible:stock>0||tipo==='Virtual'});
    showToast('✅ Libro actualizado');
  } else {
    BOOKS.push({id:Date.now(),title,author,isbn,categoria:cat,tipo,stock,disponible:stock>0||tipo==='Virtual'});
    showToast('✅ Libro registrado');
  }
  closeModal();navigateTo('books');
}

function myProfile() {
  const u = currentUser;
  const student = u.role==='Estudiante' ? STUDENTS.find(s=>s.email===u.email) : null;
  return `
  <div class="page active">
    <div class="page-header"><h2>Mi Perfil</h2><p>Información de tu cuenta</p></div>
    <div class="profile-card">
      <div class="profile-avatar">${u.name.charAt(0)}</div>
      <div class="profile-info">
        <h3>${u.name}</h3>
        <p>${u.email}</p>
        <div class="profile-meta">
          <span class="profile-tag">@${u.username}</span>
          <span class="profile-tag topbar-role ${u.role==='Admin'?'role-admin':u.role==='Bibliotecario'?'role-biblio':'role-student'}">${u.role}</span>
          ${student?`<span class="profile-tag">${student.codigo}</span>`:''}
        </div>
      </div>
    </div>
    ${student ? `
    <div class="card">
      <div class="card-header"><h3>Información Académica</h3></div>
      <div style="padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:6px">Carrera</div>
          <div style="font-size:14px;font-weight:500">${student.carrera}</div>
        </div>
        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:6px">Teléfono</div>
          <div style="font-size:14px;font-family:'JetBrains Mono',monospace">${student.phone}</div>
        </div>
        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:6px">Estado</div>
          <span class="badge ${student.status?'badge-green':'badge-red'}">${student.status?'Activo':'Bloqueado'}</span>
        </div>
        <div>
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:6px">Acceso Biblioteca</div>
          <span class="badge ${student.library_access?'badge-green':'badge-red'}">${student.library_access?'Habilitado':'Restringido'}</span>
        </div>
      </div>
    </div>` : ''}
    <div class="card">
      <div class="card-header"><h3>Seguridad</h3></div>
      <div style="padding:20px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:13px;font-weight:600">Contraseña</div>
            <div style="font-size:12px;color:var(--text2)">Última actualización: hoy</div>
          </div>
          <button class="btn btn-ghost" onclick="showToast('🔐 Función disponible en el backend')">Cambiar</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── MODAL ──
function openModal(html){ document.getElementById('modal-inner').innerHTML=html; document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal'))closeModal(); });

// ── TOAST ──
function showToast(msg) {
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
</script>
</body>
</html>
