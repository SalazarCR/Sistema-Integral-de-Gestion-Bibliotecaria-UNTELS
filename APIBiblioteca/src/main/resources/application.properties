spring.application.name=APIBiblioteca

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bdbiblioteca
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Security & JWT
security.jwt.secret=your-secret-key-here-min-32-characters-length-required
security.jwt.expiration=86400000
security.jwt.refresh-expiration=604800000

# Logging
logging.level.root=INFO
logging.level.pe.edu.untels=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=DEBUG
